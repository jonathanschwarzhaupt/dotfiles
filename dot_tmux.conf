# ─────────────────────────────────────────────
# GENERAL
# ─────────────────────────────────────────────

set-option -g history-limit 25000
set -g mouse on

# for neovim
set -sg escape-time 10
set-option -g focus-events on

# vi for copy mode
setw -g mode-keys vi

# term colors, these are the correct ones according to neovim checkhealth
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ',xterm-256color:Tc'


# ─────────────────────────────────────────────
# INDEXING
# ─────────────────────────────────────────────

# count windows and panes from 1 (more intuitive with keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# re-number windows automatically when one is closed
# prevents gaps in numbering (e.g. 1, 3, 4 → 1, 2, 3)
set -g renumber-windows on


# ─────────────────────────────────────────────
# STATUS BAR
# ─────────────────────────────────────────────

set -g status-right "#(pomo)"
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"
set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""


# ─────────────────────────────────────────────
# WINDOW NAMING
# ─────────────────────────────────────────────

# rename windows to the current working directory (basename only)
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'


# ─────────────────────────────────────────────
# PANE NAVIGATION (vim-style)
# ─────────────────────────────────────────────

# Move between panes with h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with H/J/K/L (shift + hjkl), 5 cells at a time
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Jump back to the last active pane (like alt-tabbing between two panes)
bind -r \; last-pane

# Open new panes in the same directory as the current pane.
# Without this, new panes always open in $HOME
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"


# ─────────────────────────────────────────────
# MISC BINDINGS
# ─────────────────────────────────────────────

# Reload config with prefix + r (no need to kill and restart tmux)
bind-key -r r source-file ~/.tmux.conf \; display-message "Config reloaded"
